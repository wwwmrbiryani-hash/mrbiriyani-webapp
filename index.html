<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1"><title>MR Biriyani</title><style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* loading */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
}

/* header */

header{
text-align:center;
padding:15px;
background:white;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* banner slider */

.slider img{
width:100%;
height:180px;
object-fit:cover;
}

/* menu */

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
}

/* quantity */

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:8px;
}

.qty button{
width:30px;
height:30px;
font-size:18px;
}

/* cart badge */

#cartBadge{
position:fixed;
top:15px;
right:15px;
background:red;
color:white;
padding:6px 10px;
border-radius:50%;
}

/* place order bar */

#cartBar{
position:fixed;
bottom:60px;
width:100%;
background:#e63946;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

/* bottom nav */

nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:12px;
box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

</style></head><body><div id="loading"><h2>MR Biriyani</h2>
<p>Loading delicious food...</p></div><header><h2>MR Biriyani</h2>
<p>Welcome to Patnagarh</p></header><div id="cartBadge">0</div><div class="slider"><img id="banner" src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"></div><div class="menu"><div class="card"><img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"><h3>Chicken Biryani</h3><p>₹120</p><div class="qty"><button onclick="changeQty('c',-1)">−</button>

<span id="c">0</span>

<button onclick="changeQty('c',1)">+</button>

</div></div><div class="card"><img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a"><h3>Matka Biryani</h3><p>₹180</p><div class="qty"><button onclick="changeQty('m',-1)">−</button>

<span id="m">0</span>

<button onclick="changeQty('m',1)">+</button>

</div></div></div><div id="cartBar">Place Order ₹<span id="total">0</span>

</div><nav><div>Home</div><div>Orders</div><div>Profile</div></nav><script>

/* loading */

setTimeout(()=>{

document.getElementById("loading").style.display="none"

},3000)

/* slider */

let banners=[
"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d",
"https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a"
]

let i=0

setInterval(()=>{

i=(i+1)%banners.length

document.getElementById("banner").src=banners[i]

},3000)

/* cart */

function changeQty(id,val){

let el=document.getElementById(id)

let q=parseInt(el.innerText)

q+=val

if(q<0) q=0

el.innerText=q

updateCart()

}

function updateCart(){

let c=parseInt(document.getElementById("c").innerText)

let m=parseInt(document.getElementById("m").innerText)

let total=c*120+m*180

document.getElementById("total").innerText=total

document.getElementById("cartBadge").innerText=c+m

}

</script></body>
</html>
