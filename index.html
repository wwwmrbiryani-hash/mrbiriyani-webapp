<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MR Biriyani</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* loading */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:9999;
}

.loader{
border:5px solid #eee;
border-top:5px solid red;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* header */

header{
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
background:white;
}

.logo{
width:40px;
}

/* slider */

.slider{
width:100%;
overflow:hidden;
}

.slide{
display:none;
}

.slide img{
width:100%;
}

/* food */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

/* quantity */

.qty{
display:flex;
justify-content:center;
gap:5px;
margin-top:5px;
}

/* cart badge */

#cartBadge{
background:red;
color:white;
border-radius:50%;
padding:3px 7px;
font-size:12px;
}

/* sidebar */

#sidebar{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:white;
box-shadow:4px 0 10px rgba(0,0,0,0.2);
padding:20px;
transition:0.3s;
}

#sidebar.open{
left:0;
}

/* success */

#success{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:24px;
}

/* map */

#map{
height:200px;
margin:10px;
border-radius:10px;
}

/* nav */

nav{
position:fixed;
bottom:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:10px;
box-shadow:0 -4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<!-- loading -->

<div id="loading">

<img src="logo.png" width="90">

<h2>MR Biriyani</h2>

<div class="loader"></div>

<p>Loading delicious food...</p>

</div>

<!-- sidebar -->

<div id="sidebar">

<h2>Menu</h2>

<p>Home</p>
<p>Orders</p>
<p>Profile</p>

</div>

<!-- success -->

<div id="success">

<h1>🎉 Order Confirmed</h1>

<p>Your food is being prepared</p>

</div>

<header>

<button onclick="toggleMenu()">☰</button>

<img src="logo.png" class="logo">

<div>Cart <span id="cartBadge">0</span></div>

</header>

<!-- slider -->

<div class="slider">

<div class="slide">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
</div>

<div class="slide">
<img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a">
</div>

</div>

<!-- food -->

<div class="menu">

<div class="card">

<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">

<h3>Chicken Biryani</h3>

<p>₹120</p>

<div class="qty">

<button onclick="changeQty('chicken',-1)">−</button>

<span id="chicken">0</span>

<button onclick="changeQty('chicken',1)">+</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a">

<h3>Matka Biryani</h3>

<p>₹180</p>

<div class="qty">

<button onclick="changeQty('matka',-1)">−</button>

<span id="matka">0</span>

<button onclick="changeQty('matka',1)">+</button>

</div>

</div>

</div>

<h3 style="padding-left:10px;">Live Delivery Map</h3>

<div id="map"></div>

<nav>

<div onclick="order()">Place Order</div>

</nav>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>

setTimeout(()=>{
document.getElementById("loading").style.display="none"
},3000)

/* slider */

let slides=document.querySelectorAll(".slide")
let index=0

function showSlide(){

slides.forEach(s=>s.style.display="none")

slides[index].style.display="block"

index=(index+1)%slides.length

}

setInterval(showSlide,3000)

showSlide()

/* sidebar */

function toggleMenu(){

document.getElementById("sidebar").classList.toggle("open")

}

/* quantity */

let cart=0

function changeQty(id,val){

let el=document.getElementById(id)

let q=parseInt(el.innerText)

q+=val

if(q<0) q=0

el.innerText=q

updateCart()

}

function updateCart(){

let total=0

document.querySelectorAll(".qty span").forEach(e=>{
total+=parseInt(e.innerText)
})

cart=total

document.getElementById("cartBadge").innerText=cart

}

/* order */

function order(){

if(cart==0){

alert("Cart empty")

return

}

document.getElementById("success").style.display="flex"

setTimeout(()=>{
document.getElementById("success").style.display="none"
},4000)

}

/* map */

var map=L.map('map').setView([20.84,82.57],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

L.marker([20.84,82.57]).addTo(map).bindPopup("Delivery Location")

</script>

</body>
</html>
