<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MR Biriyani</title><style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* LOADING */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
}

#loading img{
width:110px;
margin-bottom:10px;
}

.loader{
border:5px solid #eee;
border-top:5px solid red;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* HEADER */

header{
text-align:center;
background:white;
padding:15px;
}

.welcome{
color:#e63946;
font-weight:bold;
animation:fade 2s infinite alternate;
}

@keyframes fade{
from{opacity:0.4}
to{opacity:1}
}

/* SLIDER */

.slider img{
width:100%;
height:180px;
object-fit:cover;
}

/* MENU */

.menu{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:10px;
padding:10px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:10px;
}

/* QTY */

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:5px;
}

.qty button{
width:30px;
height:30px;
}

/* CART BADGE */

#cartBadge{
position:fixed;
top:15px;
right:15px;
background:red;
color:white;
padding:6px 10px;
border-radius:50%;
}

/* ORDER BAR */

#orderBar{
position:fixed;
bottom:60px;
width:100%;
background:#e63946;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

/* NAV */

nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:white;
padding:10px;
box-shadow:0 -3px 10px rgba(0,0,0,0.2);
}

/* SCREENS */

#checkout,#profile{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

/* SUCCESS */

#success{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
font-size:26px;
animation:pop 0.5s;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

button{
margin-top:10px;
padding:10px;
border:none;
background:#e63946;
color:white;
border-radius:8px;
}

</style></head><body><!-- LOADING --><div id="loading"><img src="https://cdn-icons-png.flaticon.com/512/5787/5787016.png"><h2>MR Biriyani</h2><div class="loader"></div></div><header><h2>MR Biriyani</h2><p class="welcome">Welcome to Patnagarh</p></header><div id="cartBadge">0</div><!-- BANNER --><div class="slider"><img id="banner" src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"></div><!-- HOME --><div id="home"><div class="menu"><div class="card"><img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"><h3>Chicken Biryani</h3><p>₹120</p><div class="qty"><button onclick="changeQty('c',-1)">−</button>

<span id="c">0</span>

<button onclick="changeQty('c',1)">+</button>

</div></div><div class="card"><img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a"><h3>Matka Biryani</h3><p>₹180</p><div class="qty"><button onclick="changeQty('m',-1)">−</button>

<span id="m">0</span>

<button onclick="changeQty('m',1)">+</button>

</div></div></div></div><!-- CHECKOUT --><div id="checkout"><h2>Delivery Details</h2><input id="name" placeholder="Name"><input id="phone" placeholder="Mobile Number"><input id="address" placeholder="Address"><button onclick="getLocation()">Use My Location</button>

<h3>Payment Method</h3><label><input type="radio" name="pay"> Cash</label><br>

<label><input type="radio" name="pay"> UPI</label>

<button onclick="confirmOrder()">Confirm Order</button>

</div><!-- PROFILE --><div id="profile"><h2>Your Profile</h2><p>Name: Guest User</p><p>City: Patnagarh</p></div><!-- SUCCESS --><div id="success"><h1>✅ Order Confirmed</h1><p>Your food is being prepared</p><button onclick="goHome()">Back Home</button>

</div><!-- ORDER BAR --><div id="orderBar" onclick="openCheckout()">Place Order ₹<span id="total">0</span>

</div><!-- NAV --><nav><div onclick="showHome()">Home</div><div onclick="showOrders()">Orders</div><div onclick="showProfile()">Profile</div></nav><script>

/* LOADING */

setTimeout(()=>{

document.getElementById("loading").style.display="none"

},2500)

/* BANNER */

let banners=[

"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d",

"https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a"

]

let b=0

setInterval(()=>{

b=(b+1)%banners.length

document.getElementById("banner").src=banners[b]

},3000)

/* CART */

function changeQty(id,val){

let el=document.getElementById(id)

let q=parseInt(el.innerText)

q+=val

if(q<0)q=0

el.innerText=q

updateCart()

}

function updateCart(){

let c=parseInt(document.getElementById("c").innerText)

let m=parseInt(document.getElementById("m").innerText)

let total=c*120+m*180

document.getElementById("total").innerText=total

document.getElementById("cartBadge").innerText=c+m

}

/* CHECKOUT */

function openCheckout(){

document.getElementById("home").style.display="none"

document.getElementById("profile").style.display="none"

document.getElementById("checkout").style.display="block"

}

/* LOCATION */

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

let lat=position.coords.latitude
let lon=position.coords.longitude

fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`)
.then(res=>res.json())
.then(data=>{
document.getElementById("address").value=data.display_name
})

})

}else{

alert("Location not supported")

}

}

/* CONFIRM */

function confirmOrder(){

let order={time:new Date().toLocaleString()}

let history=JSON.parse(localStorage.getItem("orders")||"[]")

history.push(order)

localStorage.setItem("orders",JSON.stringify(history))

document.getElementById("success").style.display="flex"

}

/* ORDERS */

function showOrders(){

let history=JSON.parse(localStorage.getItem("orders")||"[]")

alert("Your Orders:\n\n"+history.map(o=>o.time).join("\n"))

}

/* NAVIGATION */

function showHome(){

document.getElementById("home").style.display="block"

document.getElementById("checkout").style.display="none"

document.getElementById("profile").style.display="none"

}

function showProfile(){

document.getElementById("home").style.display="none"

document.getElementById("checkout").style.display="none"

document.getElementById("profile").style.display="block"

}

function goHome(){

location.reload()

}

</script></body>
</html>
