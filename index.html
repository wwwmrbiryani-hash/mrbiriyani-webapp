<!DOCTYPE html>
<html>
<head>
<title>MR Biriyani</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.logo{
width:200px;
margin-top:20px;
}

h1{
color:#e63946;
}

.menu{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
width:200px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.card img{
width:100%;
border-radius:10px;
}

button{
background:#e63946;
color:white;
border:none;
padding:10px;
border-radius:5px;
cursor:pointer;
}

.cart{
margin-top:30px;
background:white;
padding:20px;
width:300px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<img class="logo" src="logo.png">

<h1>MR Biriyani</h1>
<p>Best Biryani in your city</p>

<div class="menu">

<div class="card">
<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
<h3>Chicken Biryani</h3>
<p>₹120</p>
<button onclick="addToCart('Chicken Biryani',120)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a">
<h3>Matka Biryani</h3>
<p>₹180</p>
<button onclick="addToCart('Matka Biryani',180)">Add to Cart</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1633945274405-b6c8069047b0">
<h3>Egg Biryani</h3>
<p>₹90</p>
<button onclick="addToCart('Egg Biryani',90)">Add to Cart</button>
</div>

</div>

<div class="cart">

<h2>Your Cart</h2>

<ul id="cart"></ul>

<p>Total: ₹<span id="total">0</span></p>

</div>

<script>

let total = 0;

function addToCart(item, price){

let cart = document.getElementById("cart");

let li = document.createElement("li");
li.textContent = item + " - ₹" + price;

cart.appendChild(li);

total += price;

document.getElementById("total").textContent = total;

}

</script>

</body>
</html>
