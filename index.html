<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MR Biriyani</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.3/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f3f3;
}

/* loading */

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:999;
}

.loader{
border:5px solid #eee;
border-top:5px solid red;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
100%{transform:rotate(360deg)}
}

/* header */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:white;
}

.logo{
width:40px;
}

/* cart badge */

#cartBadge{
background:red;
color:white;
border-radius:50%;
padding:3px 8px;
font-size:12px;
}

/* slider */

.slider img{
width:100%;
height:180px;
object-fit:cover;
}

/* food cards */

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
padding:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

/* quantity */

.qty{
display:flex;
justify-content:center;
gap:6px;
}

/* checkout */

#checkout{
display:none;
padding:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ddd;
}

/* order success */

#success{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
font-size:24px;
}

/* map */

#map{
height:220px;
margin:10px;
border-radius:10px;
}

/* bottom button */

#orderBar{
position:fixed;
bottom:0;
width:100%;
background:#e63946;
color:white;
text-align:center;
padding:15px;
font-size:18px;
}

</style>
</head>

<body>

<!-- loading -->

<div id="loading">

<img src="logo.png" width="90">

<h2>MR Biriyani</h2>

<div class="loader"></div>

<p>Loading delicious food...</p>

</div>

<!-- success -->

<div id="success">

<h1>✅ Order Confirmed</h1>

<p>Your food is being prepared</p>

</div>

<!-- header -->

<header>

<img src="logo.png" class="logo">

<div>Cart <span id="cartBadge">0</span></div>

</header>

<!-- slider -->

<div class="slider">

<img id="banner" src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">

</div>

<!-- home -->

<div id="home">

<div class="menu">

<div class="card">

<img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">

<h3>Chicken Biryani</h3>

<p>₹120</p>

<div class="qty">

<button onclick="changeQty('chicken',-1)">−</button>

<span id="chicken">0</span>

<button onclick="changeQty('chicken',1)">+</button>

</div>

</div>

<div class="card">

<img src="https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a">

<h3>Matka Biryani</h3>

<p>₹180</p>

<div class="qty">

<button onclick="changeQty('matka',-1)">−</button>

<span id="matka">0</span>

<button onclick="changeQty('matka',1)">+</button>

</div>

</div>

</div>

</div>

<!-- checkout -->

<div id="checkout">

<h2>Delivery Details</h2>

<input id="name" placeholder="Your Name">

<input id="phone" placeholder="Mobile Number">

<input id="address" placeholder="Delivery Address">

<button onclick="getLocation()">Use My Location</button>

<h3>Payment Method</h3>

<label><input type="radio" name="pay"> Cash On Delivery</label><br>
<label><input type="radio" name="pay"> UPI</label><br>
<label><input type="radio" name="pay"> PhonePe</label>

<br><br>

<button onclick="confirmOrder()">Confirm Order</button>

</div>

<h3 style="padding-left:10px;">Delivery Map</h3>

<div id="map"></div>

<div id="orderBar" onclick="openCheckout()">

Place Order

</div>

<script src="https://unpkg.com/leaflet@1.9.3/dist/leaflet.js"></script>

<script>

/* loading */

setTimeout(()=>{
document.getElementById("loading").style.display="none"
},3000)

/* slider */

let banners=[
"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d",
"https://images.unsplash.com/photo-1631515243349-e0cb75fb8d3a"
]

let b=0

setInterval(()=>{
b=(b+1)%banners.length
document.getElementById("banner").src=banners[b]
},3000)

/* quantity */

function changeQty(id,val){

let el=document.getElementById(id)

let q=parseInt(el.innerText)

q+=val

if(q<0) q=0

el.innerText=q

updateCart()

}

function updateCart(){

let total=0

document.querySelectorAll(".qty span").forEach(e=>{
total+=parseInt(e.innerText)
})

document.getElementById("cartBadge").innerText=total

}

/* checkout */

function openCheckout(){

document.getElementById("home").style.display="none"

document.getElementById("checkout").style.display="block"

}

/* location */

function getLocation(){

navigator.geolocation.getCurrentPosition(pos=>{

let lat=pos.coords.latitude
let lon=pos.coords.longitude

document.getElementById("address").value="Lat:"+lat+" Long:"+lon

})

}

/* confirm */

function confirmOrder(){

document.getElementById("success").style.display="flex"

setTimeout(()=>{

document.getElementById("success").style.display="none"

},4000)

}

/* map */

var map=L.map('map').setView([20.84,82.57],13)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

L.marker([20.84,82.57]).addTo(map)

</script>

</body>
</html>
